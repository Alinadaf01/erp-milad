server {
    listen 80;
    server_name wegalerp.ir www.wegalerp.ir;

    # Serve static assets directly from disk — no Node.js involved
    location /assets/ {
        alias /var/www/erp/.output/public/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Serve other public files (favicon, etc.)
    location ~* \.(ico|png|svg|webp|woff2|woff|ttf)$ {
        root /var/www/erp/.output/public;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri @proxy;
    }

    # Proxy SSR requests to Node.js
    location @proxy {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_connect_timeout 10;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60;
        proxy_connect_timeout 10;
    }
}
